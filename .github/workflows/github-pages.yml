# Publishes the static map app to GitHub Pages.
# After the first run, open: https://<owner>.github.io/<repo>/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          set -e
          mkdir -p site/data/processed site/baselines/outputs site/outputs/interpretability
          cp -r frontend site/
          cp data/processed/grid_cells.geojson site/data/processed/
          cp baselines/outputs/model_results.csv site/baselines/outputs/
          cp outputs/interpretability/* site/outputs/interpretability/
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=frontend/index.html" />
            <title>Fire risk explorer</title>
          </head>
          <body>
            <p><a href="frontend/index.html">Open the app</a></p>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
